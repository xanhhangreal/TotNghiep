name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn scipy joblib pytest

      - name: Syntax check
        run: |
          python -m compileall src tests

      - name: Run unit tests
        run: |
          pytest -q tests
